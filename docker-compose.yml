version: "3.11"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultiq-api
    ports:
      - "8000:8000"
    volumes:
      - ./certs:/app/certs:ro
      - vaultiq_data:/app/data
      - ./vault:/app/vault
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/vaultiq.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultiq-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vaultiq_data:
