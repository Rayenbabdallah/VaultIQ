version: "3.11"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultiq-api
    ports:
      - "8000:8000"
    volumes:
      - ./certs:/app/certs:ro
      - ./data:/app/data:ro       # users.json registry — read-only
      - ./vault:/app/vault
      - vaultiq_db:/app/db        # SQLite DB in a managed volume (no Windows perms issues)
    env_file:
      - .env
    environment:
      DB_PATH: /app/db/vaultiq.db
      # Set MOCK_AI=true here (or in .env) to run without AWS credentials.
      # The .env file overrides this if AWS keys are present and MOCK_AI=false.
      MOCK_AI: ${MOCK_AI:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultiq-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started   # don't block on healthy — nginx starts instantly
    restart: unless-stopped

volumes:
  vaultiq_db:
